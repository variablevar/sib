services:
  sib-analysis:
    image: ghcr.io/matijazezelj/sib-analysis:latest
    build: .
    container_name: sib-analysis
    restart: unless-stopped
    ports:
      - "${ANALYSIS_BIND:-127.0.0.1}:5000:5000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - analysis-cache:/app/cache
    networks:
      - sib-network
    environment:
      - PYTHONUNBUFFERED=1
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
      # API keys via env var (default) or Docker Secrets file:
      #   ANTHROPIC_API_KEY_FILE=/run/secrets/anthropic_key  (recommended for production)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:14b}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

volumes:
  analysis-cache:

networks:
  sib-network:
    external: true
